<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sterling Halberg | Secure Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#0f172a',
            secondary: '#0d9488',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 overflow-hidden relative">
  <!-- Decorative background glows -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-teal-500/10 rounded-full blur-[128px] -z-10 animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-[128px] -z-10"></div>

  <div class="w-full max-w-md p-6">
    <!-- Glassmorphic Login Card -->
    <div class="glass-card rounded-2xl p-8 shadow-2xl relative overflow-hidden transition-all duration-300 hover:border-teal-500/30">
      
      <!-- Top Branding -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 bg-gradient-to-tr from-teal-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-teal-500/20 mb-4 animate-bounce">
          <span class="material-symbols-outlined text-white text-[24px]">architecture</span>
        </div>
        <h1 class="text-xl font-bold text-white tracking-tight">Sterling Halberg</h1>
        <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Executive CRM Login</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-5">
        <div>
          <label for="username" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-[18px]">person</span>
            <input 
              id="username" 
              name="username" 
              type="text" 
              required 
              autocomplete="username"
              class="w-full bg-slate-950/60 border border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:border-teal-500 focus:ring-1 focus:ring-teal-500/20 focus:outline-none transition-colors"
              placeholder="Enter username"
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-[18px]">lock</span>
            <input 
              id="password" 
              name="password" 
              type="password" 
              required 
              autocomplete="current-password"
              class="w-full bg-slate-950/60 border border-slate-800 rounded-lg pl-10 pr-10 py-2.5 text-sm text-white placeholder-slate-600 focus:border-teal-500 focus:ring-1 focus:ring-teal-500/20 focus:outline-none transition-colors"
              placeholder="Enter password"
            />
            <button 
              type="button" 
              id="togglePassword" 
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors flex items-center"
            >
              <span class="material-symbols-outlined text-[18px]" id="passwordIcon">visibility</span>
            </button>
          </div>
        </div>

        <!-- Feedback Alert Container -->
        <div id="errorAlert" class="hidden p-3 rounded-lg bg-red-950/40 border border-red-800/60 text-red-200 text-xs flex items-start gap-2">
          <span class="material-symbols-outlined text-red-400 text-[16px] shrink-0 mt-0.5">error</span>
          <span id="errorMessage">Invalid username or password.</span>
        </div>

        <button 
          type="submit" 
          id="btnSubmit" 
          class="w-full h-11 bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 active:scale-98 text-white font-bold rounded-lg flex items-center justify-center gap-2 transition-all text-sm shadow-lg shadow-teal-900/20"
        >
          <span class="material-symbols-outlined text-[18px]">key</span>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('btnSubmit');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const passwordIcon = document.getElementById('passwordIcon');

    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      passwordIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear previous error
      errorAlert.classList.add('hidden');
      
      // Disable button, show loading
      submitBtn.disabled = true;
      const originalBtnHtml = submitBtn.innerHTML;
      submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Authenticating...
      `;

      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
          // Success: Redirect to dashboard
          window.location.href = '/';
        } else {
          // Display error
          errorMessage.textContent = data.error || 'Invalid credentials. Please try again.';
          errorAlert.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnHtml;
        }
      } catch (err) {
        errorMessage.textContent = 'Server connection error. Please try again.';
        errorAlert.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnHtml;
      }
    });
  </script>
</body>
</html>
